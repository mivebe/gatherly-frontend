<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Фон кръг -->
  <circle cx="100" cy="100" r="96" fill="#1F3864"/>

  <!-- Календарна страница -->
  <rect x="50" y="52" rx="8" ry="8" width="100" height="100" fill="#FFFFFF" opacity="0.95"/>
  <!-- Горна лента на календара -->
  <rect x="50" y="52" rx="8" ry="0" width="100" height="26" fill="#2E75B6"/>
  <!-- Халки на календара -->
  <rect x="72" y="44" width="6" height="18" rx="3" fill="#FFFFFF"/>
  <rect x="122" y="44" width="6" height="18" rx="3" fill="#FFFFFF"/>

  <!-- Решетка на дните (3×3) -->
  <rect x="62" y="88" width="16" height="12" rx="3" fill="#E8EDF4"/>
  <rect x="84" y="88" width="16" height="12" rx="3" fill="#E8EDF4"/>
  <rect x="106" y="88" width="16" height="12" rx="3" fill="#E8EDF4"/>

  <rect x="62" y="106" width="16" height="12" rx="3" fill="#E8EDF4"/>
  <rect x="84" y="106" width="16" height="12" rx="3" fill="#2E75B6"/>
  <rect x="106" y="106" width="16" height="12" rx="3" fill="#E8EDF4"/>

  <rect x="62" y="124" width="16" height="12" rx="3" fill="#E8EDF4"/>
  <rect x="84" y="124" width="16" height="12" rx="3" fill="#E8EDF4"/>
  <rect x="106" y="124" width="16" height="12" rx="3" fill="#E8EDF4"/>

  <!-- Отметка (чек) върху маркирания ден -->
  <polyline points="88,110 91,114 98,107" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Пин маркер долу-дясно  -->
  <g transform="translate(128, 120)">
    <circle cx="12" cy="8" r="16" fill="#1F3864" stroke="#FFFFFF" stroke-width="3"/>
    <circle cx="12" cy="6" r="6" fill="#2E75B6"/>
    <path d="M12 22 L12 30" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M6 27 L18 27" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
